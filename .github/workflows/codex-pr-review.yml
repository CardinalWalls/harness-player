name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - name: Resolve PR metadata
        id: pr_meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER)
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number: ${process.env.PR_NUMBER}`)
              return
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })

            core.setOutput('head_ref', pr.head.ref)
            core.setOutput('base_ref', pr.base.ref)

      - name: Check out PR head commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head
          fetch-depth: 0

      - name: Fetch base ref for review scope
        env:
          PR_BASE_REF: ${{ steps.pr_meta.outputs.base_ref }}
        run: |
          git fetch --no-tags origin "${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}"
          git diff --stat "origin/${PR_BASE_REF}...HEAD" >/dev/null

      - name: Set up MoonBit
        uses: hustcer/setup-moonbit@v1.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle MoonBit core
        run: |
          pushd "$HOME/.moon/lib/core"
          moon bundle --target all
          popd

      - name: Detect Codex secret availability
        id: secret_check
        run: |
          if [ -n "${{ secrets.ROUTIN_API_KEY }}" ]; then
            echo "has_routin_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_routin_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        id: run_codex
        if: ${{ steps.secret_check.outputs.has_routin_key == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.ROUTIN_API_KEY }}
          responses-api-endpoint: https://api.routin.ai/v1/responses
          prompt: |
            Review this pull request for a repository that combines OMX orchestration, MoonBit validation, and GitHub Actions.
            Scope the review to the PR diff from `origin/${{ steps.pr_meta.outputs.base_ref }}` to `HEAD`.
            Use `git diff origin/${{ steps.pr_meta.outputs.base_ref }}...HEAD` as the authoritative review scope.
            Focus on:
            - MoonBit correctness and validation gaps
            - GitHub Actions safety and permission scope
            - Workflow mismatches between OMX orchestration and actual repo commands
            Keep the review concise and actionable.

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex_review
    if: needs.codex_review.outputs.final_message != ''
    permissions:
      issues: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER || context.issue.number)
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number for feedback posting: ${process.env.PR_NUMBER || context.issue.number}`)
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            })
