name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Check out PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch PR refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin "${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}"
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-${PR_NUMBER}-head"
          git diff --stat "origin/${PR_BASE_REF}...HEAD" >/dev/null

      - name: Set up MoonBit
        uses: hustcer/setup-moonbit@v1.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle MoonBit core
        run: |
          pushd "$HOME/.moon/lib/core"
          moon bundle --target all
          popd

      - name: Detect Codex secret availability
        id: secret_check
        run: |
          if [ -n "${{ secrets.ROUTIN_API_KEY }}" ]; then
            echo "has_routin_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_routin_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        id: run_codex
        if: ${{ steps.secret_check.outputs.has_routin_key == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.ROUTIN_API_KEY }}
          responses-api-endpoint: https://api.routin.ai/v1/responses
          prompt: |
            Review this pull request for a repository that combines OMX orchestration, MoonBit validation, and GitHub Actions.
            Scope the review to the PR diff from `origin/${{ github.event.pull_request.base.ref }}` to `HEAD`.
            Use `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD` as the authoritative review scope.
            Focus on:
            - MoonBit correctness and validation gaps
            - GitHub Actions safety and permission scope
            - Workflow mismatches between OMX orchestration and actual repo commands
            Keep the review concise and actionable.

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex_review
    if: needs.codex_review.outputs.final_message != ''
    permissions:
      issues: write
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            })
