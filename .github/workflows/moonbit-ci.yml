name: MoonBit CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MoonBit via moonup
        uses: chawyehsu/setup-moonup@v1

      - name: Show MoonBit version
        run: moon version --all

      - name: Run moon check
        run: moon check

      - name: Run moon test
        run: moon test

      - name: Run moon fmt
        run: moon fmt

      - name: Run moon info
        run: moon info

      - name: Run moon coverage
        run: moon coverage analyze -- -f html -o coverage.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonbit-coverage-html
          path: coverage.html
